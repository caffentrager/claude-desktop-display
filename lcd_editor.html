<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>18x2 LCD ESP32 Code Generator</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
  h2 { color: #569cd6; }
  .lcd-container { 
    display: grid; 
    grid-template-rows: repeat(2, 40px); 
    grid-gap: 4px; 
    background: #00FF00;
    padding: 10px; 
    width: fit-content; 
    border: 4px solid #333;
    border-radius: 5px;
  }
  .lcd-row { 
    display: grid; 
    grid-template-columns: repeat(18, 25px); 
    grid-gap: 4px; 
  }
  .lcd-cell { 
    width: 25px; 
    height: 40px; 
    font-size: 20px; 
    font-weight: bold;
    text-align: center; 
    background: #80FF80; 
    color: #000;
    border: 1px solid #444; 
    font-family: monospace; 
    padding: 0;
  }
  .lcd-cell:focus { background: #fff; outline: 2px solid #007acc; }
  button { 
    margin-top: 20px; 
    padding: 10px 20px; 
    font-size: 16px; 
    background-color: #007acc; 
    color: white; 
    border: none; 
    border-radius: 4px; 
    cursor: pointer; 
  }
  button:hover { background-color: #005999; }
  pre { 
    background: #252526; 
    padding: 15px; 
    border-left: 4px solid #569cd6; 
    overflow-x: auto; 
    font-family: Consolas, monospace;
    font-size: 14px;
    margin-top: 20px;
  }
</style>
</head>
<body>
  <h2>18x2 LCD Layout Editor</h2>
  <div class="lcd-container" id="lcd"></div>
  <button onclick="generateCode()">ESP32 코드 생성</button>
  <pre id="output">코드가 여기에 표시됩니다.</pre>

  <script>
    const lcd = document.getElementById('lcd');
    for(let r=0; r<2; r++) {
      const row = document.createElement('div');
      row.className = 'lcd-row';
      for(let c=0; c<18; c++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 1;
        input.className = 'lcd-cell';
        input.dataset.r = r;
        input.dataset.c = c;
        
        // 글자 입력 시 자동 이동 이벤트
        input.addEventListener('input', function(e) {
          if(this.value.length === 1) {
            let nextR = r, nextC = c;
            if(c < 17) {
              nextC = c + 1;
            } else if(r === 0) {
              nextR = 1;
              nextC = 0;
            }
            if(nextR !== r || nextC !== c) {
              document.querySelector(`.lcd-cell[data-r="${nextR}"][data-c="${nextC}"]`).focus();
            }
          }
        });

        // 특수 키 이벤트 (방향키, 엔터, 백스페이스)
        input.addEventListener('keydown', function(e) {
            let nextR = r, nextC = c;
            
            if(e.key === 'ArrowRight') nextC = Math.min(17, c + 1);
            if(e.key === 'ArrowLeft') nextC = Math.max(0, c - 1);
            if(e.key === 'ArrowDown') nextR = Math.min(1, r + 1);
            if(e.key === 'ArrowUp') nextR = Math.max(0, r - 1);
            
            // 엔터(줄바꿈) 시 아랫줄 첫 칸으로 이동
            if(e.key === 'Enter' && r === 0) {
              nextR = 1;
              nextC = 0;
            }

            // 백스페이스 처리: 현재 칸이 비어있으면 이전 칸으로 이동
            if(e.key === 'Backspace' && this.value === '') {
              if(c > 0) {
                nextC = c - 1;
              } else if(r === 1) {
                nextR = 0;
                nextC = 17;
              }
            }
            
            if(nextR !== r || nextC !== c) {
                document.querySelector(`.lcd-cell[data-r="${nextR}"][data-c="${nextC}"]`).focus();
                if(e.key !== 'Enter' && e.key !== 'Backspace') {
                  e.preventDefault();
                }
            }
        });
        row.appendChild(input);
      }
      lcd.appendChild(row);
    }

    function generateCode() {
      let code = `// LiquidCrystal_I2C 라이브러리 기준 출력 코드\n`;
      code += `void printLayout() {\n  lcd.clear();\n\n`;

      for(let r=0; r<2; r++) {
        let currentString = '';
        let startCol = -1;
        
        for(let c=0; c<18; c++) {
          const val = document.querySelector(`.lcd-cell[data-r="${r}"][data-c="${c}"]`).value;
          const char = val === '' ? ' ' : val;

          if(char !== ' ') {
            if(startCol === -1) startCol = c;
            currentString += char;
          } else {
            if(currentString.length > 0) {
              code += `  lcd.setCursor(${startCol}, ${r});\n`;
              code += `  lcd.print("${currentString}");\n`;
              currentString = '';
              startCol = -1;
            }
          }
        }
        if(currentString.length > 0) {
          code += `  lcd.setCursor(${startCol}, ${r});\n`;
          code += `  lcd.print("${currentString}");\n`;
        }
      }
      code += `}\n`;
      document.getElementById('output').textContent = code;
    }
  </script>
</body>
</html>
