<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>18x2 LCD Layout Editor</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
  h2 { color: #569cd6; }
  .lcd-container {
    display: grid;
    grid-template-rows: repeat(2, 40px);
    grid-gap: 4px;
    background: #00FF00;
    padding: 10px;
    width: fit-content;
    border: 4px solid #333;
    border-radius: 5px;
  }
  .lcd-row {
    display: grid;
    grid-template-columns: repeat(18, 25px);
    grid-gap: 4px;
  }
  .lcd-cell {
    width: 25px;
    height: 40px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    background: #80FF80;
    color: #000;
    border: 1px solid #444;
    font-family: monospace;
    padding: 0;
  }
  .lcd-cell:focus { background: #fff; outline: 2px solid #007acc; }
</style>
</head>
<body>
  <h2>18x2 LCD Layout Editor</h2>
  <div class="lcd-container" id="lcd"></div>

  <script>
    const lcd = document.getElementById('lcd');

    function focusCell(r, c) {
      document.querySelector(`.lcd-cell[data-r="${r}"][data-c="${c}"]`).focus();
    }

    for (let r = 0; r < 2; r++) {
      const row = document.createElement('div');
      row.className = 'lcd-row';
      for (let c = 0; c < 18; c++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 1;
        input.className = 'lcd-cell';
        input.dataset.r = r;
        input.dataset.c = c;

        // 글자 입력 시 다음 칸으로 자동 이동 (마지막 칸이면 다음 줄 첫 칸으로)
        input.addEventListener('input', function (e) {
          if (this.value.length !== 1) return;
          if (c < 17) {
            focusCell(r, c + 1);
          } else if (r === 0) {
            focusCell(1, 0);
          }
        });

        // 방향키 / 엔터 / 백스페이스로 칸 이동
        input.addEventListener('keydown', function (e) {
          let nextR = r, nextC = c;

          if (e.key === 'ArrowRight') nextC = Math.min(17, c + 1);
          else if (e.key === 'ArrowLeft') nextC = Math.max(0, c - 1);
          else if (e.key === 'ArrowDown') nextR = Math.min(1, r + 1);
          else if (e.key === 'ArrowUp') nextR = Math.max(0, r - 1);
          else if (e.key === 'Enter' && r === 0) {
            nextR = 1;
            nextC = 0;
          } else if (e.key === 'Backspace' && this.value === '') {
            if (c > 0) {
              nextC = c - 1;
            } else if (r === 1) {
              nextR = 0;
              nextC = 17;
            }
          }

          if (nextR !== r || nextC !== c) {
            focusCell(nextR, nextC);
            if (e.key !== 'Enter' && e.key !== 'Backspace') {
              e.preventDefault();
            }
          }
        });
        row.appendChild(input);
      }
      lcd.appendChild(row);
    }
  </script>
</body>
</html>
