[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Detected via `pio device list` (USB VID:PID=303A:1001, Espressif's own
; native-USB descriptor, not a CP2102/CH340 bridge chip): this board uses
; the ESP32-C3's built-in USB-Serial-JTAG peripheral (HWCDC) directly.
; Both flags are required together - CDC_ON_BOOT alone routes Serial to the
; USBCDC.cpp path (full USB-OTG, ESP32-S2/S3 only), which doesn't apply to
; C3's simpler USB-Serial-JTAG peripheral and leaves Serial undeclared.
; USB_MODE=1 selects the HWCDC.cpp path instead, which is the correct one
; for C3/C6/H2. If you swap to a board with a separate USB-UART bridge
; chip, remove both - they break Serial entirely on those.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ArduinoJson isn't needed anymore - usage now comes straight from HTTPS
; response headers (see api call in main.cpp), not a JSON body.
lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
